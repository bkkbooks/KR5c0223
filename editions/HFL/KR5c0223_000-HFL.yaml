body:
  text: 御炁之法上至泥丸下至命門二景相隨可救殘老矣若呼不得神宰一息不全吸不得神宰亦一息不全若能息息之中使神炁相合則胎從伏炁中結炁從有胎中息胎炁内結永無死矣功成之後男子聚精女子結嬰雖動於欲不能與神爭是謂真返精爲神也此者乃是上清玉真修息之訣日能行之自得其味漸合太上真道海蟾真人胎息訣夫元炁者天地之母大道之根隂陽之質在物名淳利之炁在人名元炁者也乃性命也凡一晝一夜一萬三千五百息常常口鼻中泄了真炁聖人久錬胎息者常納於丹田故微微出入定自身安而得長生長生者乃心與神炁相合與道同真也玄葫真人胎息訣夫大道以空爲本絶相爲妙達本元靜定太素納炁於丹田鍊神於金室定心於覺海心定神寧神寧則炁住炁住則自然心樂常於百刻之中含守於真息又云神息定而金木交心意寜而龍虎會此内丹之真胎息之用也凡修道之人若要長生不死先須鍊心直人曰心者在肺之下一寸三分曰玉壷内有虛白一炁經云虚中生白一名玉壷二名神室三名玉舘四名絳宫中有救苦天尊中有不死之神中有靈寶天尊中有元始符命中有太一真人中有救苦真人常持元炁勿令失散丹砂結就大如黍米色如黄金一名寶琳若人識得辯得認得塞其六門常守天真胎息自成延年久而不死矣袁天綱胎息訣夫隂陽者天地之真炁一隂一陽生育萬物在人為呼吸之炁在天爲寒暑之炁又云此兩者能改移四時之炁此乃戊己包藏真炁云春至在巽能發生萬物夏至在坤能長養萬物秋至在乾能成熟萬物冬至在艮能含藏萬物此皆隂陽出没昇降神用故陽炁出水盛木隂炁岀火盛金陽生於子出乎卯隂生於午入乎酉此四仲之辰皆是天地之門戸也凡大道者必取四時之正炁凡修行動息爲隂定息為陽凡作時須得心定力定神定息定龍親虎會結就聖胎名曰真人胎息也于真人胎息訣凡所修行先定心炁心炁定則神凝神凝則心安心安則炁昇炁昇則境空境空則清靜清静則無物無物則命全命全則道生道生則絕相絶相則覺明覺明則神通經云心通萬法皆通心靜萬法皆滅此一門如來真定者也凡修道者先修心定之法既得定法還丹不遠金液非遥仙道得矣徐神公胎息訣夫神者虚无之用息者元炁之用鍊去塵世之境若是非人我財色取捨得失𡨚親平等如一自然祐護道心成矣經云神者虛无用之精炁神三者便是靈臺修行之人若是息定精炁神三件可長生不死必爲出世之仙則不虚矣煙蘿子胎息訣夫動者本動靜者本静古者本無動靜且動静者一源蓋爲一切衆生妄想不定聖人留教教人定息神隨炁定炁住神定若炁動心動心動神疲凡修道之人不行胎息則有動靜之源怎入無為之門户也走失了也達磨禪師胎息訣夫鍊胎息者鍊炁定心是也常息於心輪則不著萬物炁若不定禪亦空也炁若定則色身無病禪道雙安修行之人因不守心元炁失了不收道怎成矣古人云炁定心定炁凝心靜是大道之要又名還丹道人無諸掛念日日如斯則名真定禪觀故三世賢聖修行皆在此訣名爲禪定雙修也李真人胎息訣諱子眀夫胎息真炁者入於一淨室焚香面壁東南結跏趺坐心無掛念意無所思澄神定息常於遍身觀之自然通暢諸學之人不得全閉定炁全閉則傷神但量自家息之長短放炁出入不得自耳聞之如此則妙也若常常調息不出不入久而在於丹田固守在之者名爲真胎也道必成矣抱朴子胎息訣凡修行之人須要定息息者正也安也順也歸也伏也寧也靜也若四威儀中常作如是決入真道勿著諸境虛心實腹最爲妙也但澄息心定心定則炁寂炁寂則神靜神靜則境空境空則寂滅寂滅則無事無事則清靜清静則道生道生則自然自然則逍遥既入逍遙則無量自在得做神仙自然五行總聚六炁和合八卦配偶成於内丹身形永劫不壞矣亢倉子胎息訣凡修鍊入道息心勿亂精神勿泄息神勿惕息忓勿出息言勿語息血勿滯息唾勿遠息涕勿棄息嗔勿惱息神勿憂息怨勿念息我勿爭息害勿記若人行住坐卧常持如是其心自樂自然成就不修此理枉費其功終無成法但日日如是其丹必就若動静雙忘道不求自得矣元憲眞人胎息訣夫學無爲胎息者只是本清静心也亦名真如本無物也有若太虚相似無去無來無上無下非動非靜寂寂寥寥與真空同體與大道同源與本面目相逢者也若修大道當修無爲其心清虚寂而無寂静而無靜心澄境謝心境雙忘則入無爲真道也學道之人若修如是法門則其丹自成自然炁定而得胎息矣何仙姑胎息訣夫鍊者修也息者炁也神也精也息炁本源者清静真炁也觀入丹田細細出入如此者龍虎自伏若心無動神無思炁無欲則名曰太定真炁存於形質真仙之位變化無窮號曰真人矣夫胎息者須存神定意抱守三關者精炁神也凡修行之人須毎於六時常抱守三法則自然有寶聚也國富民安心王自在乃神和暢少病也少惱也身體輕便也耳目聦明也是修真之人真道徑路若三五年間常行此法天護祐神加持凡人愛敬久而自然得道矣玉雲張果老胎息訣夫胎者受生之宫也息炁納於元海在母臍下一寸三分名曰丹田受真精成形納天地之炁一月如珠二月如露三月如桃李此名淳和之炁朴也子在母胞胎之中母呼則呼母吸則吸至於十月炁足而生六情轉於外豈於返視元初不守内息故有生死故聖人云我不縱三尸六情常息於丹田守而無退凡修道之人先修心静之門又云了心修道則省力而易成不了心而修道修道者返費功而無益先了心源然後自定自然龍虎伏觀仙道必成矣夫丹田者在臍下一寸三分是元炁之宫位管三百六十坐精光神守護元炁內有神龜一生吐納元炁往來呼吸一晝一夜一萬三千五百息皆兀炁於口鼻中泄出故引入邪炁所侵而生病也丹田者生炁之源一名丹田二名精路三名炁海四名守宫五名大源六名神室七名元藏八名採寳九名戊己十名本根皆是太和元炁居止之處若存精炁於丹田則得長生久視之道凡修行之人行住坐卧常含納真息於丹田則得元炁成實久鍊而成仙矣斯乃真人之胎息者也侯真人胎息訣夫真一法界者不離於本源本源者則是一心也不動不行心則是源不停不住源則是心其心清靜則成大藥其心惑亂則成大賊奪其精盗其神敗其罏失其藥患其身丧其命也凡在道之人必先修心靜之法但於心静必得定心心定則神安鉛汞相投龍虎親也周天數足添精益炁養神此三法若全則萬神感㑹於丹田血炁周流於遍體逍遥於長生之道又云如何清靜當澄真神絶其慮亡其我滅其境抱其真此謂妙静之道鬼谷子胎息訣凡修道之人返本還純内合真炁故道返則四象五行六炁七元八卦而鍊精炁神成其形質則是虚中取實無中取有而内秘真丹也故鍊心爲神鍊精為形鍊炁爲命此是隂陽昇降之炁也炁源者命之根也故修三法則大道也黃帝胎息訣凡修道者常行内觀遣去三尸岀於六情返内存三心神守宫炁閉不散諸神歡暢養炁鍊形存性此三法不可棄是真一胎息也玄關太藥也陣希夷胎息訣夫道化少少化老老化病病化死死化神神化萬物炁化生靈精化成形神炁精三化鍊成真仙故云存精養神鍊炁此乃三徳之神不可不知子午卯酉四時乃是隂陽岀入之門户也定心不動謂之曰禪神通萬變謂之曰靈智通萬事謂之曰慧道元合炁謂之曰修真炁歸源謂之曰鍊龍虎相交謂之曰丹三丹同契謂之曰了若修行之人知此根源乃可入道近矣逍遥子胎息訣夫修者志也養也養者頥也伏也真也凡欲養息先須養精凡欲養精先須養神凡欲養神先須養性凡欲養性先須養命性命者乃是神炁也魂魄也隂陽也離坎也久而行之結成聖胎乃眞胎息也張天師胎息訣夫元炁無形真心無法大道無迹唯鍊息一法乃含真道又云心定炁定神定凡修道流若合大丹元道清虛寂靜絶慮忘意空靜無物萬法無蹤真修胎息也成仙無疑也郭真人胎息訣夫鍊者修也養也虛也耳不聽也眼不見也鼻不聞也舌不味也息炁定心也此法從不有中有不無中無不色中色不空中空非有爲有非無爲無非色爲色非空為空此乃其胎息養炁調神之法又云視不見我聽不得聞離種種邊名爲妙道此法最爲上也中央黃老君胎息訣夫本立天地生於隂陽清炁爲天濁炁爲地清炁爲心濁炁爲腎被世牽惹引動人心故清濁不分也怎暁此理哉毎動作處經行處眼見耳聞五賊送了真元眼送與心心動神疲又被耳送與心心送音聲入腎神勞心煩壞了也若動念則泄真炁故胎息不成矣如何得成若人静坐念心不動息念忘情炁神調匀久而自成仙矣柳真人胎息訣夫人往往在世間不知自身日用物所造化也噫乃上天之炁也元精不衰物結成器上依天之清炁聚而成形下接地之濁炁凝而成體内包一真世人不識故泄於外乃精炁神也若不守此三者老死近矣聖人常不離此三法行住坐卧久結成胎神仙矣頌曰為人在世不知根一向貪心棄本真不管元陽真息炁至今天怒病纏身驪山老毋胎息訣經云天地萬物之盗萬物人之盗人萬物之盗故三盗相反走失了真炁精神也不成胎息若修行之人不愛萬物自不盗你本性也故云本分道人我不要你底你不要我底只守分守分者何也乃是不出不入常守本源不動不静不來不去似有似無是箇死的活人仙道近矣李仙姑胎息訣夫世間之人奉道持修須要朝真謝罪毎於庚申甲子之日父毋遠忌之辰三元八節之日宜修齋醮者神天祐護更若毎日清静無事澄心静坐調神養炁不離本室自然三宮昇降六氣周流百脉通行萬物齊會於黃庭黃庭者乃中宫也若常守於中宫精炁不走此乃真胎息也天台道者胎息訣凡人修鍊常行平等忍辱一屏邪心所起真心志堅運心腎二炁上下往來交媾於中宫諸神不散温養元炁丹砂黃芽自出深根固蔕永息綿綿久而長生出世得道矣劉真人胎息訣若修胎息元道之法心不殺不欲不盗不偷不邪不妄不顛不狂心自明朗常守齋戒真息常調觀照遍身世界身心清静乃是長生道人若金坈寳貝堅實六門不開邪炁不入一身無病患若六門不閉盗盡金寶人生疾也道自不成矣頌曰心中真炁是天英正是神清炁鏡明大道若依玄妙用心中清靜炁生靈一去一來不暫停上下無休造化成神静炁澄無事染這廻息住自然靈後學之者不息元道妄念不停生滅不息随他物去了怎成胎息也朗然子胎息訣凡修行之人焚香入室靜坐㝠心叩齒集神定意馬伏心猿都收在一處放在丹田令温養之内觀勿出如元帥行軍神是主炁是軍炁到處神到二物相逐不得相離萬病不干千災皆滅學道之人若得此法勤而行之今日貧道方泄天機你若不行我有殃矣百嶂内視胎息訣且胎息者世人不知諸賢皆從證果若不得此法也把不定不得口訣不得下手不得親傳把手教著尚做不過一等愚人便待定心猿捉意馬往往空費其功夫不成大事若真修鍊之人欲捉心猿收意馬先須調炁定息然後澄心息慮忘情乃可應也若不如是則空過了時光日月不因師指此事難知矣曹仙姑胎息訣且胎息者非方術之所能爲爲者則失道逺矣且人之生也須以神存炁留道生神與炁二者相須乃成性命虛者通靈而光明和者周流而柔潤神安則炁暢炁暢則血融血融則骨强骨強則髓滿髄滿則腹盈腹盈則下實下實則行步輕健行步輕健則動作不疲四肢康强猶國之封域平泰炁血和盛猶國之府庫充實譬人家富神志和恱顔色自怡行歩歌舞仙道近矣故曰今人念佛念道只要除災救禍不如志念除妄還好麽逹人觀斯而行之自成胎息者矣諸真聖胎神用訣終
