front:
  text: 諸真聖胎神用訣命二師曰知至道者天不殺服元炁者地不滅夫至道者不遠秪在已身用心精微命乃長久劉公祕㫖曰欲得長生當修所生之本始於精炁精炁待而爲形形爲受炁之本炁是有形之根元炁禀形之由可察成形之理經曰深根固蒂長生久視之道又曰形中子母何不守之且形中以元炁爲母以神爲子初因呼吸之炁而立成形故爲母也形炁既立而固有神故爲子也夫至神也與炁合形神與炁但循環於藏府之内馭呼吸於上下久久習之則神自明而炁自和神既内明照徹五藏炁和則使用於四肢故黄帝三月内視住心以神則化生纏綿五藏斯言可推而得之也又曰意中動静炁得神通行道自持我神光明斯理之然然可推而得之也今世之人神與炁各行子與母相離炁雖呼吸於内神常運物於外如此遂使炁無主而神不通神不通而精自散又以神爲主以形爲宅舍主人不營於内日營於外自然宅舍空虛而形體衰朽矣况末世道流毎一畫一夜百刻之中形炁之得緫一萬三千五百息皆外役於神無息住於形體之中而何能冀長生久視之道先生曰若知神炁之所主子母運行則長生不死之門可見也若炁無主宰任自呼吸咐通利五藏消化五榖而巳不能還隂返陽填補血腦耳師曰吾以神爲車以炁爲馬終日御之而不倦也經云天下有道却走馬以糞正謂此也尹真人曰神能御氣則鼻不息斯言至矣
